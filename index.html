<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LARA Cosmetics Shop</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;}
  body {
    background: linear-gradient(135deg, #fff0f5, #ffe4f0, #f8e0f8);
    color: #222;
    overflow-x: hidden;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 999;
    padding: 18px 6%;
    background: rgba(255, 240, 245, 0.88);
    backdrop-filter: blur(12px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255, 105, 180, 0.2);
  }
  .logo {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(90deg, #ff69b4, #ff8c00, #ff69b4);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  nav {display:flex;align-items:center;gap:20px;}
  nav a {text-decoration:none;color:#444;font-weight:500;transition:.3s;}
  nav a:hover {color:#ff69b4;}
  .cart-btn {
    background: linear-gradient(90deg, #ff69b4, #ff8c00);
    border:none;
    padding:10px 18px;
    border-radius:30px;
    cursor:pointer;
    font-weight:700;
    color:#000;
    transition:.3s;
  }
  .cart-btn:hover {transform:scale(1.05);box-shadow:0 0 20px rgba(255,105,180,0.5);}

  .hero {padding:70px 6%;text-align:center;}
  .hero h1 {
    font-size:clamp(2.8rem,8vw,5rem);
    font-weight:900;
    background:linear-gradient(90deg,#ff1493,#ff69b4,#ff8c00,#ff1493);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .search-box {
    margin:40px auto 0;
    max-width:650px;
    display:flex;
    gap:10px;
    justify-content:center;
  }
  .search-box input,.search-box select {
    padding:12px 15px;
    border-radius:10px;
    border:1px solid #ffb6c1;
    outline:none;
    font-size:1rem;
    background:white;
  }
  .search-box input {flex:1;}
  .search-box select {width:220px;cursor:pointer;}

  .products {padding:40px 6% 80px;}
  .products h2 {text-align:center;font-size:2.5rem;margin-bottom:30px;color:#ff69b4;}

  .product-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
  }
  .card {
    background:rgba(255,245,247,0.85);
    border:1px solid #ffb6c1;
    border-radius:18px;
    padding:18px;
    transition:.3s;
    cursor:pointer;
    box-shadow:0 4px 20px rgba(255,105,180,0.1);
  }
  .card:hover {transform:translateY(-10px);box-shadow:0 8px 30px rgba(255,105,180,0.2);}
  .card img {width:100%;height:220px;object-fit:cover;border-radius:15px;}
  .card h3 {margin-top:12px;font-size:1.2rem;color:#333;}
  .card p {margin-top:6px;font-size:1rem;color:#555;}
  .price {margin-top:10px;font-size:1.2rem;font-weight:800;color:#ff4500;}
  .btn {
    margin-top:14px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
    background:linear-gradient(90deg,#ff69b4,#ff8c00);
    color:#000;
    transition:.3s;
  }
  .btn:hover {transform:scale(1.03);box-shadow:0 0 20px rgba(255,105,180,0.5);}

  /* ─── PRODUCT MODAL ─── */
  .modal {
    display:none;
    position:fixed;
    z-index:10000;
    left:0;
    top:0;
    width:100%;
    height:100%;
    overflow:auto;
    background-color:rgba(0,0,0,0.6);
    backdrop-filter:blur(4px);
  }
  .modal-content {
    background:rgba(255,240,245,0.98);
    margin:8% auto;
    padding:25px;
    border:1px solid #ffb6c1;
    width:90%;
    max-width:500px;
    border-radius:16px;
    box-shadow:0 10px 40px rgba(255,105,180,0.3);
    position:relative;
  }
  .close-modal {
    position:absolute;
    right:20px;
    top:10px;
    color:#ff69b4;
    font-size:2.2rem;
    font-weight:bold;
    cursor:pointer;
  }
  .modal img {
    width:100%;
    max-height:320px;
    object-fit:contain;
    border-radius:12px;
    margin-bottom:15px;
  }
  .modal h2 {color:#ff69b4;margin-bottom:10px;}
  .modal .price {font-size:1.5rem;color:#ff4500;margin:10px 0;}
  .color-select {
    width:100%;
    padding:10px;
    margin:12px 0;
    border-radius:10px;
    border:1px solid #ffb6c1;
    font-size:1rem;
  }
  .add-to-cart-modal {
    width:100%;
    padding:14px;
    background:linear-gradient(90deg,#ff69b4,#ff8c00);
    color:#000;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    font-size:1.1rem;
  }

  /* Cart sidebar styles (unchanged - ඔයාගේ original එකම තියෙනවා) */
  .cart-sidebar { /* ... ඔයාගේ original cart styles ... */ }
  /* ... rest of your cart, toast, footer styles ... */

</style>
</head>
<body>

<!-- Header, hero, search, products section unchanged -->

<section class="products" id="products">
  <h2>Our Products 💄</h2>
  <div class="product-grid" id="productGrid"></div>
</section>

<!-- About & Footer unchanged -->

<!-- CART SIDEBAR unchanged -->

<!-- MODAL -->
<div id="productModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <img id="modalImage" src="" alt="Product">
    <h2 id="modalName"></h2>
    <p id="modalCategory"></p>
    <p id="modalDesc"></p>
    <div class="price" id="modalPrice"></div>
    
    <select id="modalColorSelect" class="color-select" style="display:none;">
      <!-- colors dynamically add වෙනවා -->
    </select>
    
    <button class="add-to-cart-modal" id="addFromModal">➕ Add to Cart</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
emailjs.init("W_o_RiuSlVn_zCxlp");

let products = [];
let currentProduct = null;

fetch('https://script.google.com/macros/s/AKfycby0FNsa6h84fanuT5xgOD__MH8L69-ORZSXnJJjk1qmvYZ_SSnrRNgLQUjVQujfh8WN/exec')
  .then(response => response.json())
  .then(data => {
    products = data;
    renderProducts();
  })
  .catch(() => {
    document.getElementById('productGrid').innerHTML = '<p style="text-align:center;color:#ff69b4;font-size:1.2rem;">Products load failed 😢 Refresh කරන්න</p>';
  });

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// saveCart, showToast, toggleCart, removeFromCart, changeQty, updateCartCount functions ඔයාගේ original එකම තියෙනවා කියලා assume කරලා skip කළා (ඔයා copy paste කරගන්න)

// Updated addToCart (color support එක්ක)
function addToCart(productId, selectedColor = null) {
  const key = selectedColor ? `${productId}-${selectedColor}` : productId;
  let item = cart.find(i => i.key === key);
  if (item) {
    item.qty += 1;
  } else {
    cart.push({ key, id: productId, color: selectedColor, qty: 1 });
  }
  saveCart();
  renderCart();
  updateCartCount();
  showToast("Added to cart ✓");
  closeModal(); // modal එක close කරනවා
}

// Product card render (click → open modal)
function renderProducts() {
  const grid = document.getElementById("productGrid");
  grid.innerHTML = "";
  const search = document.getElementById("searchInput")?.value.toLowerCase() || "";
  const category = document.getElementById("categoryFilter")?.value || "all";

  const filtered = products.filter(p => {
    return p.name.toLowerCase().includes(search) &&
           (category === "all" || p.category === category);
  });

  filtered.forEach(p => {
    grid.innerHTML += `
      <div class="card" onclick="openProductModal(${p.id})">
        <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/250?text=No+Image';">
        <h3>${p.name}</h3>
        <p>Category: ${p.category}</p>
        <div class="price">Rs. ${p.price}</div>
        <button class="btn">View Details 👀</button>
      </div>
    `;
  });
}

// Modal open function
function openProductModal(id) {
  currentProduct = products.find(p => p.id === id);
  if (!currentProduct) return;

  document.getElementById("modalImage").src = currentProduct.image;
  document.getElementById("modalName").textContent = currentProduct.name;
  document.getElementById("modalCategory").textContent = "Category: " + currentProduct.category;
  document.getElementById("modalDesc").textContent = currentProduct.description || "No description available.";
  document.getElementById("modalPrice").textContent = "Rs. " + currentProduct.price;

  const colorSelect = document.getElementById("modalColorSelect");
  colorSelect.innerHTML = "";
  colorSelect.style.display = "none";

  if (currentProduct.colors && currentProduct.colors.trim() !== "") {
    const colors = currentProduct.colors.split(",").map(c => c.trim());
    colors.forEach(color => {
      const opt = document.createElement("option");
      opt.value = color;
      opt.textContent = color;
      colorSelect.appendChild(opt);
    });
    colorSelect.style.display = "block";
  }

  // Add to cart from modal
  const addBtn = document.getElementById("addFromModal");
  addBtn.onclick = () => {
    const selectedColor = colorSelect.style.display !== "none" ? colorSelect.value : null;
    addToCart(currentProduct.id, selectedColor);
  };

  document.getElementById("productModal").style.display = "block";
}

function closeModal() {
  document.getElementById("productModal").style.display = "none";
}

// Modal එක outside click කළොත් close
window.onclick = function(event) {
  const modal = document.getElementById("productModal");
  if (event.target === modal) {
    closeModal();
  }
}

// renderCart, placeOrder functions ඔයාගේ original එක update කරලා තියෙන එක copy කරගන්න
// (color support තියෙන version එක use කරන්න - previous messages වල තිබුණා)

// Initial load
renderProducts();
renderCart();
updateCartCount();
</script>
</body>
</html>
