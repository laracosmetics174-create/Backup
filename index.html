<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LARA Cosmetics Shop</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;}
 
  body {
    background: linear-gradient(135deg, #fff0f5, #ffe4f0, #f8e0f8);
    color: #222;
    overflow-x: hidden;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 999;
    padding: 18px 6%;
    background: rgba(255, 240, 245, 0.88);
    backdrop-filter: blur(12px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255, 105, 180, 0.2);
  }
  .logo {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(90deg, #ff69b4, #ff8c00, #ff69b4);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  nav {display:flex;align-items:center;gap:20px;}
  nav a {
    text-decoration: none;
    color: #444;
    font-weight: 500;
    transition: .3s;
  }
  nav a:hover {color: #ff69b4;}
  .cart-btn {
    background: linear-gradient(90deg, #ff69b4, #ff8c00);
    border: none;
    padding: 10px 18px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 700;
    color: #000;
    transition: .3s;
  }
  .cart-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
  }
  /* ... (hero, products, search etc. styles unchanged) ... */

  /* CART SIDEBAR - Improved */
  .cart-sidebar {
    position: fixed;
    top: 0;
    right: -450px;
    width: 420px;
    height: 100%;
    background: rgba(255, 240, 245, 0.97);
    backdrop-filter: blur(15px);
    padding: 20px;
    transition: .4s;
    z-index: 9999;
    border-left: 1px solid #ffb6c1;
    overflow-y: auto;
    color: #222;
  }
  .cart-sidebar.active {right: 0;}
  .cart-header {display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;}
  .cart-header h2 {font-size: 1.7rem; color: #ff69b4;}
  .close-btn {cursor: pointer; font-size: 2rem; font-weight: bold; color: #ff69b4;}
  .cart-items {margin-top: 10px;}
  .cart-item {
    background: rgba(255,255,255,0.8);
    padding: 14px 16px;
    border-radius: 14px;
    margin-bottom: 16px;
    border: 1px solid #ffb6c1;
    box-shadow: 0 2px 10px rgba(255,105,180,0.08);
  }
  .cart-item h4 {
    font-size: 1.1rem;
    color: #333;
    margin-bottom: 6px;
  }
  .cart-item p {
    font-size: 0.98rem;
    color: #555;
    margin-bottom: 10px;
  }
  .cart-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  .qty-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .qty-btn {
    background: #ff69b4;
    color: white;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .qty-btn:hover {background: #ff1493; transform: scale(1.08);}
  .remove-btn {
    background: #ff8c00;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 0.95rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .remove-btn:hover {background: #e07b00; transform: scale(1.03);}
  .total-box {
    margin-top: 25px;
    padding: 18px;
    border-radius: 14px;
    background: rgba(255,255,255,0.8);
    border: 1px solid #ffb6c1;
    text-align: right;
  }
  .total-box h3 {
    font-size: 1.4rem;
    color: #ff69b4;
  }
  /* ... rest of styles (checkout, toast, etc.) unchanged ... */
</style>
</head>
<body>
<!-- Header, Hero, Products sections unchanged -->

<!-- CART SIDEBAR -->
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h2>Your Cart 🛍️</h2>
    <span class="close-btn" onclick="toggleCart()">×</span>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="total-box">
    <h3>Total: Rs. <span id="cartTotal">0</span></h3>
  </div>
  <div class="checkout">
    <h3>Checkout Details</h3>
    <input type="text" id="customerName" placeholder="Your Name">
    <input type="text" id="customerPhone" placeholder="Phone Number">
    <input type="email" id="customerEmail" placeholder="Customer Email (optional)">
    <textarea id="customerAddress" placeholder="Delivery Address"></textarea>
    <button class="order-btn" onclick="placeOrder()">📩 Place Order</button>
  </div>
</div>

<!-- Toast & EmailJS script unchanged -->

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
emailjs.init("W_o_RiuSlVn_zCxlp");
let products = [];
// fetch products ... (unchanged)

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function showToast(message, type = 'success') {
  // ... unchanged
}

function toggleCart() {
  document.getElementById("cartSidebar").classList.toggle("active");
  renderCart();
}

function addToCart(productId, color = null) {
  const key = color ? `${productId}-${color}` : productId.toString();
  
  const existing = cart.find(item => item.key === key);
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ key, id: productId, color, qty: 1 });
  }
  
  saveCart();
  renderCart();
  updateCartCount();
  showToast("Added to cart ✓");
}

function removeFromCart(key) {
  cart = cart.filter(item => item.key !== key);
  saveCart();
  renderCart();
  updateCartCount();
}

function changeQty(key, amount) {
  const item = cart.find(p => p.key === key);
  if (!item) return;
  
  item.qty = Math.max(0, item.qty + amount);
  
  if (item.qty === 0) {
    removeFromCart(key);
  } else {
    saveCart();
    renderCart();
    updateCartCount();
  }
}

function updateCartCount() {
  const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
  document.getElementById("cartCount").innerText = totalQty;
}

function renderCart() {
  const container = document.getElementById("cartItems");
  const totalEl = document.getElementById("cartTotal");
  container.innerHTML = "";
  
  if (cart.length === 0) {
    container.innerHTML = '<p style="text-align:center; color:#777; padding:30px 0;">Your cart is empty 🛒</p>';
    totalEl.innerText = "0";
    return;
  }
  
  let total = 0;
  
  cart.forEach(item => {
    const product = products.find(p => p.id === item.id);
    if (!product) return;
    
    const subtotal = product.price * item.qty;
    total += subtotal;
    
    const colorText = item.color ? ` <small>(${item.color})</small>` : '';
    
    container.innerHTML += `
      <div class="cart-item">
        <h4>${product.name}${colorText}</h4>
        <p>Rs. ${product.price} × ${item.qty} = <b>Rs. ${subtotal}</b></p>
        <div class="cart-controls">
          <div class="qty-group">
            <button class="qty-btn" onclick="changeQty('${item.key}', -1)">−</button>
            <button class="qty-btn" onclick="changeQty('${item.key}', 1)">+</button>
          </div>
          <button class="remove-btn" onclick="removeFromCart('${item.key}')">🗑 Remove</button>
        </div>
      </div>
    `;
  });
  
  totalEl.innerText = total.toLocaleString();
}

// ... rest of functions (renderProducts, placeOrder etc.) unchanged ...
</script>
</body>
</html>
