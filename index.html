<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LARA Cosmetics Shop</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;}
 
  body {
    background: linear-gradient(135deg, #fff0f5, #ffe4f0, #f8e0f8);
    color: #222;
    overflow-x: hidden;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 999;
    padding: 18px 6%;
    background: rgba(255, 240, 245, 0.88);
    backdrop-filter: blur(12px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255, 105, 180, 0.2);
  }
  .logo {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(90deg, #ff69b4, #ff8c00, #ff69b4);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  nav {display:flex;align-items:center;gap:20px;}
  nav a {
    text-decoration: none;
    color: #444;
    font-weight: 500;
    transition: .3s;
  }
  nav a:hover {color: #ff69b4;}
  .cart-btn {
    background: linear-gradient(90deg, #ff69b4, #ff8c00);
    border: none;
    padding: 10px 18px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 700;
    color: #000;
    transition: .3s;
  }
  .cart-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
  }
  .hero {padding: 70px 6%; text-align: center;}
  .hero h1 {
    font-size: clamp(2.8rem,8vw,5rem);
    font-weight: 900;
    background: linear-gradient(90deg, #ff1493, #ff69b4, #ff8c00, #ff1493);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .hero p {
    margin-top: 15px;
    font-size: 1.2rem;
    color: #555;
  }
  .search-box {
    margin: 40px auto 0;
    max-width: 650px;
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
  }
  .search-box input,
  .search-box select {
    padding: 12px 15px;
    border-radius: 10px;
    border: 1px solid #ffb6c1;
    outline: none;
    font-size: 1rem;
    width: 100%;
    background: white;
    color: #222;
  }
  .search-box select {width: 220px; cursor: pointer;}
  .products {padding: 40px 6% 80px;}
  .products h2 {
    text-align: center;
    font-size: 2.5rem;
    margin-bottom: 30px;
    color: #ff69b4;
  }
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
  }
  .card {
    background: rgba(255, 245, 247, 0.85);
    border: 1px solid #ffb6c1;
    border-radius: 18px;
    padding: 18px;
    transition: .3s;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 20px rgba(255, 105, 180, 0.1);
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-10px);
    border-color: #ff69b4;
    box-shadow: 0 8px 30px rgba(255, 105, 180, 0.2);
  }
  .card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 15px;
  }
  .card h3 {
    margin-top: 12px;
    font-size: 1.2rem;
    color: #333;
  }
  .card p {
    margin-top: 6px;
    font-size: 1rem;
    color: #555;
  }
  .price {
    margin-top: 10px;
    font-size: 1.2rem;
    font-weight: 800;
    color: #ff4500;
  }
  .btn {
    margin-top: 14px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
    background: linear-gradient(90deg, #ff69b4, #ff8c00);
    color: #000;
    transition: .3s;
  }
  .btn:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
  }

  /* Modal styles - image fix සමග */
  .modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10000;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal.active {display: flex;}
  .modal-content {
    background: white; max-width: 520px; width: 100%; border-radius: 20px;
    overflow: hidden; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  .modal-header {
    padding: 20px; background: linear-gradient(90deg, #ff69b4, #ff8c00); color: white;
    text-align: center; font-size: 1.4rem; font-weight: 700;
  }
  .modal-body {padding: 20px; text-align: center;}

  .modal-body img {
    width: 90%;
    max-width: 360px;
    max-height: 420px;
    object-fit: contain;
    border-radius: 16px;
    margin: 15px auto 25px;
    display: block;
    background: #fff5f7;
    padding: 15px;
    box-shadow: 0 6px 20px rgba(255,105,180,0.2);
    border: 1px solid #ffe4e1;
  }

  @media (max-width: 500px) {
    .modal-body img {
      max-height: 320px;
      width: 95%;
      padding: 10px;
    }
  }

  /* Color swatches */
  .swatches {
    margin: 15px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
  }
  .swatch-container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .swatch {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .swatch-label {
    margin-top: 6px;
    font-size: 0.85rem;
    color: #555;
  }

  .modal-close {
    position: absolute;
    top: 12px;
    right: 18px;
    font-size: 2.2rem;
    color: white;
    cursor: pointer;
    font-weight: bold;
  }

  /* Cart sidebar & other styles ඔයාගේ original එකම තියෙනවා */
  .cart-sidebar { /* ඔයාගේ original cart styles තියෙන තැනට paste කරගන්න */ }
  /* toast, footer ආදියත් ඔයාගේ original එකෙන්ම තියාගන්න */
</style>
</head>
<body>
<!-- ඔයාගේ original header, hero, search-box, products section, about, footer ඔක්කොම තියෙනවා -->

<!-- CART SIDEBAR ඔයාගේ original එකම තියෙනවා -->

<!-- Modal add කරන්න -->
<div class="modal" id="productModal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">×</span>
    <div class="modal-header" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Toast div ඔයාගේ original එකම තියෙනවා -->

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
  // ඔයාගේ original JS code එකේ ඉහතින් තියෙන තැන් ඔක්කොම තියාගන්න
  // පහත functions විතරක් update / add කරන්න

  function showProductDetail(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;

    document.getElementById("modalTitle").textContent = p.name;

    let colorsHtml = '';
    if (p.colors && p.colors.trim()) {
      const colors = p.colors.split(',').map(c => c.trim()).filter(Boolean);
      colorsHtml = '<div class="swatches">';
      colors.forEach(c => {
        let bg = c.startsWith('#') ? c : '#cccccc'; // HEX නැත්නම් gray fallback
        colorsHtml += `<div class="swatch-container">
          <div class="swatch" style="background:${bg};"></div>
          <div class="swatch-label">${c}</div>
        </div>`;
      });
      colorsHtml += '</div>';
    }

    document.getElementById("modalBody").innerHTML = `
      <img src="${p.image}" alt="${p.name}" 
           onerror="this.src='https://via.placeholder.com/360x420/ffe4e1/333?text=No+Image';">
      <h2 style="color:#ff4500; margin:15px 0 10px;">Rs. ${p.price}</h2>
      <p><b>Category:</b> ${p.category}</p>
      ${colorsHtml || '<p style="color:#777; margin:15px 0;">No colors available</p>'}
      <p style="margin-top:20px; line-height:1.6;">${p.description || 'No description available.'}</p>
      <button class="btn" style="margin-top:25px;" onclick="addToCart(${p.id})">➕ Add to Cart</button>
    `;

    document.getElementById("productModal").classList.add("active");
  }

  function closeModal() {
    document.getElementById("productModal").classList.remove("active");
  }

  // renderProducts ඇතුළේ card එකට මේක දාන්න (onclick එක add කරන්න)
  // උදාහරණයක්:
  // <div class="card" onclick="showProductDetail(${p.id})">
  //   ... card content ...
  // </div>

  // Modal එක outside click කළොත් close වෙන්න
  document.getElementById("productModal").addEventListener("click", e => {
    if (e.target === document.getElementById("productModal")) closeModal();
  });

  // ඔයාගේ original initial calls තියෙන තැනට මේවා එකතු කරන්න
  // renderProducts();
  // renderCart();
  // updateCartCount();
</script>
</body>
</html>
